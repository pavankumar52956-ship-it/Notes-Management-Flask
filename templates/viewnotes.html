{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Your Notes</h3>
    <a href="{{ url_for('addnote') }}" class="btn btn-success">+ New Note</a>
</div>
<div class="row">
  {% if notes %}
    {% for note in notes %}
      <div class="col-md-4 mb-3">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h5 class="card-title">{{ note.title }}</h5>
            <p class="card-text text-muted">{{ note.content[:80] }}...</p>
            <a href="{{ url_for('viewnotes', note_id=note.id) }}" class="btn btn-sm btn-primary">View</a>
            <a href="{{ url_for('updatenote', note_id=note.id) }}" class="btn btn-sm btn-warning">Edit</a>
            <form action="{{ url_for('deletenote', note_id=note.id) }}" method="POST" class="d-inline">
              <button class="btn btn-sm btn-danger" onclick="return confirm('Delete this note?')">Delete</button>
            </form>
          </div>
        </div>
      </div>
    {% endfor %}
  {% else %}
    <p>No notes found. Create one!</p>
  {% endif %}
</div>
{% endblock %}
