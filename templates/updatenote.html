{% extends 'base.html' %}
{% block title %}Edit Note{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-body">
        <h4>Edit Note</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" value="{{ note.title }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Content</label>
            <textarea name="content" class="form-control" rows="8" required>{{ note.content }}</textarea>
          </div>
          <button type="submit" class="btn btn-warning">Update Changes</button>
          <a href="{{ url_for('viewall') }}" class="btn btn-secondary">Discard</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
