{% extends 'base.html' %}
{% block title %}View Note{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-body">
        <h2 class="border-bottom pb-2">{{ note.title }}</h2>
        <p class="mt-3" style="white-space: pre-wrap;">{{ note.content }}</p>
        <hr>
        <p class="text-muted small">Created on: {{ note.created_at }}</p>
        <a href="{{ url_for('viewall') }}" class="btn btn-primary">Back to List</a>
        <a href="{{ url_for('updatenote', note_id=note.id) }}" class="btn btn-warning">Edit</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
